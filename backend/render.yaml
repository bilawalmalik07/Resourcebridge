services:
  - type: web
    name: Resourcebridge
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false # You will paste your Neon Postgres string in the Render dashboard
      - key: SECRET_KEY
        sync: false # You will paste your secret JWT key in the Render dashboard
      - key: ALGORITHM
        value: HS256
      - key: GEMINI_API_KEY
        sync: false # You will paste your Google AI Studio key in the Render dashboard
