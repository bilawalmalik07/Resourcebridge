<svg width="320" height="320" viewBox="0 0 320 320" role="img" xmlns="http://www.w3.org/2000/svg" style="background:transparent">
  <title>ResourceBridge logo</title>
  <desc>A circular logomark with centered layered documents</desc>

  <defs>
    <!-- Subtle inner shadow for depth -->
    <radialGradient id="circleGrad" cx="45%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <!-- Soft drop shadow for main doc -->
    <filter id="docShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e3a8a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="160" cy="160" r="112" fill="url(#circleGrad)"/>

  <!-- Ghost doc — back LEFT, more visible, tighter rotation -->
  <g transform="rotate(-14, 160, 160) translate(-8, 4)">
    <rect x="114" y="97" width="66" height="86" rx="8" fill="rgba(255,255,255,0.18)"/>
    <!-- folded corner -->
    <path d="M158 97 L180 119 L158 119 Z" fill="rgba(255,255,255,0.10)"/>
    <line x1="158" y1="97" x2="158" y2="119" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="158" y1="119" x2="180" y2="119" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- lines -->
    <rect x="123" y="127" width="36" height="4" rx="2" fill="rgba(255,255,255,0.18)"/>
    <rect x="123" y="138" width="28" height="4" rx="2" fill="rgba(255,255,255,0.14)"/>
    <rect x="123" y="149" width="32" height="4" rx="2" fill="rgba(255,255,255,0.14)"/>
    <rect x="123" y="160" width="22" height="4" rx="2" fill="rgba(255,255,255,0.10)"/>
  </g>

  <!-- Ghost doc — back RIGHT, mirrored -->
  <g transform="rotate(14, 160, 160) translate(8, 4)">
    <rect x="114" y="97" width="66" height="86" rx="8" fill="rgba(255,255,255,0.18)"/>
    <path d="M158 97 L180 119 L158 119 Z" fill="rgba(255,255,255,0.10)"/>
    <line x1="158" y1="97" x2="158" y2="119" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="158" y1="119" x2="180" y2="119" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="123" y="127" width="36" height="4" rx="2" fill="rgba(255,255,255,0.18)"/>
    <rect x="123" y="138" width="28" height="4" rx="2" fill="rgba(255,255,255,0.14)"/>
    <rect x="123" y="149" width="32" height="4" rx="2" fill="rgba(255,255,255,0.14)"/>
    <rect x="123" y="160" width="22" height="4" rx="2" fill="rgba(255,255,255,0.10)"/>
  </g>

  <!-- Main doc — perfectly centered: 72px wide → x=124, y=88 -->
  <g filter="url(#docShadow)">
    <rect x="124" y="88" width="72" height="96" rx="8" fill="#ffffff"/>
    <!-- Fold corner -->
    <path d="M174 88 L196 110 L174 110 Z" fill="#dbeafe"/>
    <path d="M174 88 L174 110 L196 110" fill="none" stroke="#93c5fd" stroke-width="1.2" stroke-linejoin="round"/>
  </g>

  <!-- Text lines on main doc -->
  <rect x="134" y="118" width="44" height="5" rx="2.5" fill="#bfdbfe"/>
  <rect x="134" y="130" width="52" height="5" rx="2.5" fill="#bfdbfe"/>
  <rect x="134" y="142" width="38" height="5" rx="2.5" fill="#bfdbfe"/>
  <rect x="134" y="154" width="46" height="5" rx="2.5" fill="#bfdbfe"/>
  <rect x="134" y="166" width="30" height="5" rx="2.5" fill="#dbeafe"/>

  <!-- Small "connection" accent dots — bottom right of main doc -->
  <circle cx="176" cy="172" r="4.5" fill="#1d4ed8"/>
  <circle cx="184" cy="164" r="3" fill="#60a5fa"/>
  <circle cx="184" cy="180" r="3" fill="#60a5fa"/>

</svg>
